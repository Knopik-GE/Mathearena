<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MatheArena</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MatheArena">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#2c2c3e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--p1:#FF6B6B;--p2:#4ECDC4;--mid:#2c2c3e;--gold:#FFD93D;--red:#ff4444;--green:#2ecc71;--purple:#a29bfe}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--mid);font-family:'Nunito',sans-serif;touch-action:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .screen.hidden{display:none}

  /* ── SETUP ── */
  #setup{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);gap:14px;padding:16px;overflow-y:auto}
  #setup h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--gold);text-shadow:0 4px 20px rgba(255,217,61,.4);letter-spacing:2px}

  .mode-toggle{display:flex;background:rgba(255,255,255,.07);border-radius:50px;padding:4px;gap:4px}
  .mode-btn{border:none;border-radius:50px;padding:9px 20px;font-family:'Fredoka One',cursive;font-size:.95rem;color:rgba(255,255,255,.5);background:transparent;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .mode-btn.active{background:var(--gold);color:#1a1a2e;box-shadow:0 4px 16px rgba(255,217,61,.4)}

  .variant-section{display:flex;flex-direction:column;align-items:center;gap:8px}
  .variant-section span{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4)}
  .variant-options{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .var-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:9px 14px;font-family:'Fredoka One',cursive;font-size:.88rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.3}
  .var-btn.selected{background:var(--gold);border-color:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.35)}

  /* sub-variant row (e.g. Brüche under Profi) */
  .sub-variant-row{display:flex;align-items:center;gap:10px;width:100%;padding-left:12px;margin-top:4px}
  .sub-variant-label{font-size:.75rem;color:rgba(255,255,255,.35);font-weight:700;white-space:nowrap}
  .var-btn.sub-var-btn{font-size:.82rem;padding:8px 12px;border-color:rgba(162,155,254,.3);color:rgba(162,155,254,.8);background:rgba(162,155,254,.08)}
  .var-btn.sub-var-btn.selected{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(162,155,254,.4)}

  .setup-players{display:flex;gap:18px}
  .setup-card{background:rgba(255,255,255,.07);border-radius:18px;padding:18px 22px;display:flex;flex-direction:column;align-items:center;gap:9px;border:2px solid rgba(255,255,255,.1);transition:opacity .3s}
  .setup-card label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px}
  .setup-card.p1 label{color:var(--p1)}.setup-card.p2 label{color:var(--p2)}.setup-card.solo label{color:var(--gold)}
  .setup-card input{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 12px;font-size:1.1rem;font-family:'Nunito',sans-serif;font-weight:700;color:#fff;text-align:center;outline:none;width:150px}
  .setup-card.p1 input:focus{border-color:var(--p1)}.setup-card.p2 input:focus{border-color:var(--p2)}.setup-card.solo input:focus{border-color:var(--gold)}
  .avatar{font-size:2.2rem}
  .setup-card.dimmed{opacity:.35;pointer-events:none}

  .time-section{display:flex;flex-direction:column;align-items:center;gap:8px}
  .time-section span{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4)}
  .time-options{display:flex;gap:8px}
  .time-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 15px;font-family:'Fredoka One',cursive;font-size:.95rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .time-btn.selected{background:var(--gold);border-color:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.35)}

  #startBtn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:13px 44px;font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 28px rgba(255,217,61,.4);transition:transform .15s}
  #startBtn:active{transform:scale(.96)}

  /* ── TURNIER SETUP ── */
  #tournamentSetup{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);gap:16px;padding:20px;overflow-y:auto}
  #tournamentSetup h2{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,3.5vw,2.4rem);color:var(--purple);text-shadow:0 4px 20px rgba(162,155,254,.4)}

  .t-options-row{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
  .t-section{display:flex;flex-direction:column;align-items:center;gap:8px}
  .t-section span{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4)}

  .player-list-wrap{background:rgba(255,255,255,.05);border-radius:16px;padding:14px;width:280px;max-height:220px;overflow-y:auto;border:1px solid rgba(255,255,255,.1)}
  .player-list-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .player-list-item:last-child{border-bottom:none}
  .player-list-item span{font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;flex:1}
  .player-list-item button{background:rgba(255,68,68,.2);border:none;border-radius:8px;color:var(--red);font-size:.9rem;padding:4px 8px;cursor:pointer;font-family:'Fredoka One',cursive}

  .add-player-row{display:flex;gap:8px;width:280px}
  .add-player-row input{flex:1;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 12px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;color:#fff;outline:none}
  .add-player-row input:focus{border-color:var(--purple)}
  .add-player-row button{background:var(--purple);border:none;border-radius:10px;color:#fff;font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 14px;cursor:pointer}

  .t-start-btn{background:var(--purple);color:#fff;border:none;border-radius:50px;padding:13px 44px;font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 28px rgba(162,155,254,.4);transition:transform .15s}
  .t-start-btn:active{transform:scale(.96)}
  .t-back-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:none;border-radius:50px;padding:10px 28px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer}

  /* ── TURNIER COUNTDOWN ── */
  #tCountdown{background:linear-gradient(135deg,#1a1a2e,#0f3460);gap:16px;padding:20px}
  .countdown-name{font-family:'Fredoka One',cursive;font-size:clamp(2rem,5vw,3.5rem);color:var(--purple);text-align:center}
  .countdown-sub{font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,255,255,.4);text-align:center}
  .countdown-num{font-family:'Fredoka One',cursive;font-size:8rem;color:var(--gold);text-shadow:0 0 40px rgba(255,217,61,.6);animation:countPop .8s ease;line-height:1}
  @keyframes countPop{0%{transform:scale(1.5);opacity:0}60%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}

  /* ── GAME ── */
  #game{flex-direction:row}
  .player-area{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 14px 14px}
  .player-area.p1{background:linear-gradient(180deg,#2a1515,#1e1e2e)}
  .player-area.p2{background:linear-gradient(180deg,#0d2a29,#1e1e2e)}
  .player-area.solo-area{background:linear-gradient(180deg,#1a1a2e,#0f3460)}
  .player-area.tournament-area{background:linear-gradient(180deg,#1e1525,#1e1e2e)}
  .player-area.correct-flash{animation:correctFlash .35s ease}
  .player-area.wrong-flash{animation:wrongFlash .3s ease}
  @keyframes correctFlash{0%{filter:brightness(1)}40%{filter:brightness(2.3)}100%{filter:brightness(1)}}
  @keyframes wrongFlash{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .divider{width:4px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,255,255,.15),transparent);flex-shrink:0}

  .player-header{display:flex;align-items:center;gap:8px;width:100%}
  .player-name{font-family:'Fredoka One',cursive;font-size:clamp(.95rem,1.9vw,1.45rem);flex:1}
  .p1 .player-name{color:var(--p1)}.p2 .player-name{color:var(--p2)}.solo-area .player-name{color:var(--gold)}.tournament-area .player-name{color:var(--purple)}

  .score-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .score-badge{font-family:'Fredoka One',cursive;font-size:1.4rem;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .p1 .score-badge{background:var(--p1);color:#fff;box-shadow:0 4px 14px rgba(255,107,107,.5)}
  .p2 .score-badge{background:var(--p2);color:#fff;box-shadow:0 4px 14px rgba(78,205,196,.5)}
  .solo-area .score-badge{background:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.5)}
  .tournament-area .score-badge{background:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(162,155,254,.5)}
  .penalty-label{font-size:.62rem;color:var(--red);font-weight:900;letter-spacing:1px;min-height:13px}

  .timer-bar-wrap{width:100%;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
  .timer-bar{height:100%;border-radius:4px;transition:width .5s linear,background .5s}
  .p1 .timer-bar{background:var(--p1)}.p2 .timer-bar{background:var(--p2)}.solo-area .timer-bar{background:var(--gold)}.tournament-area .timer-bar{background:var(--purple)}
  .timer-bar.warning{background:var(--gold)!important}.timer-bar.critical{background:var(--red)!important}
  .timer-text{font-family:'Fredoka One',cursive;font-size:.88rem;color:rgba(255,255,255,.4);text-align:center;margin-top:2px}

  .task-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;width:100%}
  .task-question{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,4.8vw,4rem);color:#fff;text-align:center;line-height:1}
  .task-question.pop{animation:popIn .18s cubic-bezier(.36,.07,.19,.97)}
  @keyframes popIn{0%{transform:scale(.65);opacity:0}100%{transform:scale(1);opacity:1}}

  .task-input-display{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,3.5vw,2.8rem);min-width:110px;min-height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;letter-spacing:3px;border:3px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);padding:0 14px}
  .p1 .task-input-display{border-color:rgba(255,107,107,.4)}.p2 .task-input-display{border-color:rgba(78,205,196,.4)}.solo-area .task-input-display{border-color:rgba(255,217,61,.4)}.tournament-area .task-input-display{border-color:rgba(162,155,254,.4)}
  .task-input-display.has-value{background:rgba(255,255,255,.1)}

  .live-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .stat-pill{font-family:'Fredoka One',cursive;font-size:.75rem;border-radius:20px;padding:3px 9px}
  .stat-correct{background:rgba(46,204,113,.2);color:#2ecc71}
  .stat-wrong{background:rgba(255,68,68,.2);color:var(--red)}
  .stat-net{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
  .streak-pill{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.3);min-height:16px}
  .streak-pill.active{color:var(--gold)}

  .numpad{display:grid;gap:7px;width:100%;max-width:270px}
  .num-btn{aspect-ratio:1;border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,2.4vw,1.7rem);cursor:pointer;transition:transform .1s,filter .1s;-webkit-tap-highlight-color:transparent;user-select:none}
  .num-btn:active{transform:scale(.9);filter:brightness(.8)}
  .p1 .num-btn{background:rgba(255,107,107,.18);color:var(--p1);border:2px solid rgba(255,107,107,.3)}
  .p2 .num-btn{background:rgba(78,205,196,.18);color:var(--p2);border:2px solid rgba(78,205,196,.3)}
  .solo-area .num-btn{background:rgba(255,217,61,.12);color:var(--gold);border:2px solid rgba(255,217,61,.25)}
  .tournament-area .num-btn{background:rgba(162,155,254,.12);color:var(--purple);border:2px solid rgba(162,155,254,.25)}
  .p1 .num-btn.del,.p1 .num-btn.minus-btn{background:rgba(255,107,107,.07);color:rgba(255,107,107,.6)}
  .p2 .num-btn.del,.p2 .num-btn.minus-btn{background:rgba(78,205,196,.07);color:rgba(78,205,196,.6)}
  .solo-area .num-btn.del,.solo-area .num-btn.minus-btn{background:rgba(255,217,61,.06);color:rgba(255,217,61,.6)}
  .tournament-area .num-btn.del,.tournament-area .num-btn.minus-btn{background:rgba(162,155,254,.06);color:rgba(162,155,254,.6)}
  .p1 .num-btn.ok{background:var(--p1);color:#fff;border-color:var(--p1);box-shadow:0 4px 14px rgba(255,107,107,.4)}
  .p2 .num-btn.ok{background:var(--p2);color:#1a1a2e;border-color:var(--p2);box-shadow:0 4px 14px rgba(78,205,196,.4)}
  .solo-area .num-btn.ok{background:var(--gold);color:#1a1a2e;border-color:var(--gold);box-shadow:0 4px 14px rgba(255,217,61,.4)}
  .tournament-area .num-btn.ok{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 14px rgba(162,155,254,.4)}
  .player-area.finished .numpad{opacity:.3;pointer-events:none}

  /* ── RESULT ── */
  #result{background:linear-gradient(135deg,#1a1a2e,#0f3460);gap:14px;padding:16px;overflow-y:auto}
  #result h2{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,3.2vw,2.6rem);color:var(--gold);text-align:center;text-shadow:0 4px 20px rgba(255,217,61,.5)}
  .result-cards{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center}
  .result-card{border-radius:18px;padding:14px 22px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .result-card.p1{background:rgba(255,107,107,.15);border:2px solid var(--p1)}
  .result-card.p2{background:rgba(78,205,196,.15);border:2px solid var(--p2)}
  .result-card.solo{background:rgba(255,217,61,.1);border:2px solid var(--gold)}
  .result-card.winner{transform:scale(1.07);box-shadow:0 8px 32px rgba(255,217,61,.3);border-color:var(--gold)}
  .result-card .r-name{font-family:'Fredoka One',cursive;font-size:1.1rem}
  .result-card.p1 .r-name{color:var(--p1)}.result-card.p2 .r-name{color:var(--p2)}.result-card.solo .r-name{color:var(--gold)}
  .result-card .r-score{font-family:'Fredoka One',cursive;font-size:3rem;color:#fff;line-height:1}
  .result-card .r-breakdown{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .r-correct{font-size:.72rem;background:rgba(46,204,113,.2);color:#2ecc71;border-radius:20px;padding:3px 9px;font-weight:700}
  .r-wrong{font-size:.72rem;background:rgba(255,68,68,.2);color:var(--red);border-radius:20px;padding:3px 9px;font-weight:700}
  .r-minus{font-size:.72rem;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:20px;padding:3px 9px;font-weight:700}
  .result-card .r-emoji{font-size:1.8rem}
  .vs-badge{font-family:'Fredoka One',cursive;font-size:1.2rem;color:rgba(255,255,255,.25)}

  /* solo fullscreen – single centered area */
  #game.solo-game { justify-content:center; }
  #game.solo-game #area2,
  #game.solo-game #gameDivider { display:none !important; }
  #game.solo-game .player-area { max-width:600px; flex:none; width:100%; }
  #game.solo-game .task-question { font-size:clamp(3.5rem,8vw,6rem); }
  #game.solo-game .task-input-display { font-size:clamp(2.8rem,6vw,4.5rem); min-width:180px; min-height:90px; }
  #game.solo-game .numpad { max-width:420px; gap:12px; }
  #game.solo-game .num-btn { font-size:clamp(1.8rem,4vw,2.6rem); border-radius:18px; }
  #game.solo-game .score-badge { width:58px; height:58px; font-size:2rem; }
  #game.solo-game .player-name { font-size:clamp(1.4rem,3vw,2rem); }
  #game.solo-game .timer-bar-wrap { height:10px; }
  .t-ranking{width:100%;max-width:520px;background:rgba(255,255,255,.04);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
  .t-ranking-header{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--purple);padding:10px 16px;background:rgba(162,155,254,.08);letter-spacing:1px}
  .t-rank-row{display:flex;align-items:center;gap:12px;padding:8px 16px;border-top:1px solid rgba(255,255,255,.05);transition:background .2s}
  .t-rank-row.gold{background:rgba(255,217,61,.08)}
  .t-rank-num{font-family:'Fredoka One',cursive;font-size:1.1rem;color:rgba(255,255,255,.3);width:32px;flex-shrink:0}
  .t-rank-name{font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;flex:1}
  .t-rank-pills{display:flex;gap:6px}

  .hs-section{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:480px}
  .hs-title{font-family:'Fredoka One',cursive;font-size:.95rem;color:rgba(255,255,255,.4);letter-spacing:1px}
  .hs-table{width:100%;border-collapse:collapse}
  .hs-table th{font-size:.7rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:4px 8px;text-align:left}
  .hs-table td{font-family:'Fredoka One',cursive;font-size:.88rem;color:rgba(255,255,255,.8);padding:4px 8px;border-top:1px solid rgba(255,255,255,.06)}
  .hs-table tr.new-entry td{color:var(--gold)}
  .hs-table td.rank{color:rgba(255,255,255,.3);font-size:.78rem;width:24px}
  .hs-table td.pts{text-align:right}

  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .btn-row button{border:none;border-radius:50px;padding:11px 32px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;transition:transform .15s}
  .btn-row button:active{transform:scale(.96)}
  .btn-gold{background:var(--gold);color:#1a1a2e;box-shadow:0 8px 24px rgba(255,217,61,.4)}
  .btn-purple{background:var(--purple);color:#fff;box-shadow:0 8px 24px rgba(162,155,254,.4)}
  .btn-dim{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:.85rem;padding:11px 18px}

  .confetti-piece{position:fixed;border-radius:2px;animation:confettiFall linear forwards;z-index:999;pointer-events:none}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

  /* mistakes list */
  .mistakes-section{width:100%;max-width:560px;display:flex;flex-direction:column;gap:10px}
  .mistakes-block{background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.2);border-radius:14px;overflow:hidden}
  .mistakes-header{font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--red);padding:8px 14px;background:rgba(255,68,68,.1);letter-spacing:1px}
  .mistakes-table{width:100%;border-collapse:collapse}
  .mistakes-table td{font-family:'Fredoka One',cursive;font-size:.88rem;padding:5px 14px;border-top:1px solid rgba(255,255,255,.05)}
  .mistakes-table td.m-task{color:rgba(255,255,255,.8)}
  .mistakes-table td.m-given{color:var(--red)}
  .mistakes-table td.m-arrow{color:rgba(255,255,255,.25);padding:0 4px}
  .mistakes-table td.m-correct{color:var(--green)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen">
  <h1>⚔️ MatheArena</h1>

  <!-- Level selector -->
  <div class="variant-section">
    <span>🎓 Schwierigkeitsstufe</span>
    <div class="variant-options">

function startTournamentRound(name){

// ── TASKS ──
function makePositiveTask(lastQ){
  const ops=['+','-','×','÷']; let t;
  do{
    const op=ops[~~(Math.random()*4)];
    let a,b,answer;
    if(op==='+'){a=~~(Math.random()*99)+1;b=~~(Math.random()*(100-a))+1;answer=a+b;}
    else if(op==='-'){a=~~(Math.random()*98)+2;b=~~(Math.random()*(a-1))+1;answer=a-b;}
    else if(op==='×'){a=~~(Math.random()*9)+2;b=~~(Math.random()*9)+2;answer=a*b;}
    else{b=~~(Math.random()*9)+2;answer=~~(Math.random()*9)+2;a=b*answer;}
    t={a,b,op,answer};
  }while(lastQ&&t.a===lastQ.a&&t.b===lastQ.b&&t.op===lastQ.op);
  return t;
}
function rEx(min,max,ex){let v;do{v=~~(Math.random()*(max-min+1))+min;}while(ex.includes(v));return v;}
function makeNegativeTask(lastQ){
  const ops=['+','-','×','÷']; let t=null;
  do{
    const op=ops[~~(Math.random()*4)];
    let a,b,answer;
    if(op==='+'){a=~~(Math.random()*201)-100;b=~~(Math.random()*201)-100;answer=a+b;if(Math.abs(answer)>100){t=null;continue;}}
    else if(op==='-'){a=~~(Math.random()*201)-100;b=~~(Math.random()*201)-100;answer=a-b;if(Math.abs(answer)>100){t=null;continue;}}
    else if(op==='×'){a=rEx(-10,10,[0,1,-1]);b=rEx(-10,10,[0,1,-1]);answer=a*b;if(Math.abs(answer)>100){t=null;continue;}}
    else{b=rEx(-10,10,[0,1,-1]);answer=rEx(-10,10,[0,1,-1]);a=b*answer;if(Math.abs(a)>100){t=null;continue;}}
    t={a,b,op,answer};
  }while(!t||(lastQ&&t.a===lastQ.a&&t.b===lastQ.b&&t.op===lastQ.op));
  return t;
}
// Makes a decimal task using pure integer arithmetic to avoid float errors
function makeDecimalTask(lastQ){
  const factors=[10,100,1000];
  const ops=['×','÷'];
  let t=null;
  do{
    const f=factors[~~(Math.random()*3)];
    const op=ops[~~(Math.random()*2)];
    let aStr, ansStr, rawAnswer;

    if(op==='×'){
      // Build decimal as integer / f to guarantee clean result
      // e.g. f=1000: pick integer 1001..9999, divide by 1000 → 1,001..9,999
      const minInt = f+1;           // avoid x,000 (would be integer)
      const maxInt = f*9+f-1;       // e.g. f=10: 11..99, f=100: 101..999
      const num = minInt + ~~(Math.random()*(maxInt-minInt+1));
      // a = num/f  (decimal), answer = num (integer)
      aStr = fmtInt(num, f);        // format as decimal with comma
      ansStr = String(num);
      rawAnswer = num;
    } else {
      // ÷: pick integer dividend, result is decimal
      // e.g. f=1000: dividend=1001..9999, answer=1,001..9,999
      const minInt = f+1;
      const maxInt = f*9+f-1;
      const dividend = minInt + ~~(Math.random()*(maxInt-minInt+1));
      // answer = dividend/f (decimal)
      aStr = String(dividend);
      ansStr = fmtInt(dividend, f);
      rawAnswer = dividend/f;
    }

    if(!aStr||!ansStr) { t=null; continue; }
    t = {a:aStr, b:f, op, answer:ansStr, rawAnswer};
  } while(!t||(lastQ&&t.a===lastQ.a&&t.b===lastQ.b&&t.op===lastQ.op));
  return t;
}

// Format integer n divided by f as German decimal string
// e.g. fmtInt(1234, 1000) → "1,234"  fmtInt(75, 10) → "7,5"
function fmtInt(n, f){
  const dp = f===10?1:f===100?2:3;
  const whole = Math.floor(n/f);
  const frac = n % f;
  const fracStr = String(frac).padStart(dp,'0').replace(/0+$/,''); // strip trailing zeros
  return fracStr ? whole+','+fracStr : String(whole);
}

function fmtDec(n){
  return String(Math.round(n*1000)/1000).replace('.',',');
}

// ── FRACTION TASKS ──
// Three types: 1) simplify fraction, 2) fraction→decimal, 3) add same-denominator fractions
function makeFractionTask(lastQ){
  const type = ~~(Math.random()*3); // 0,1,2
  let t=null;
  do {
    if(type===0){
      // Simplify: e.g. "6/8 = ?/4" → answer: 3
      const denoms=[2,3,4,5,6,8,10];
      const d = denoms[~~(Math.random()*denoms.length)];
      const mult = ~~(Math.random()*4)+2; // multiply by 2–5
      const bigD = d*mult;
      const n = (~~(Math.random()*(d-1))+1); // numerator 1..d-1
      const bigN = n*mult;
      // show bigN/bigD = ?/d
      t = {
        display: `${bigN}/${bigD} = ?/${d}`,
        a:`${bigN}/${bigD}`, b:`?/${d}`, op:'=',
        answer: String(n), rawAnswer: undefined,
        isFraction: true, fracType: 0
      };
    } else if(type===1){
      // Fraction → decimal: e.g. "3/4 = ?" → 0,75
      const simple = [
        {n:1,d:2,ans:'0,5'},{n:1,d:4,ans:'0,25'},{n:3,d:4,ans:'0,75'},
        {n:1,d:5,ans:'0,2'},{n:2,d:5,ans:'0,4'},{n:3,d:5,ans:'0,6'},{n:4,d:5,ans:'0,8'},
        {n:1,d:10,ans:'0,1'},{n:3,d:10,ans:'0,3'},{n:7,d:10,ans:'0,7'},
        {n:1,d:3,ans:null} // skip thirds (recurring)
      ].filter(x=>x.ans);
      const s = simple[~~(Math.random()*simple.length)];
      t = {
        display: `${s.n}/${s.d} = ?`,
        a:`${s.n}/${s.d}`, b:'?', op:'=',
        answer: s.ans, rawAnswer: parseFloat(s.ans.replace(',','.')),
        isFraction: true, fracType: 1
      };
    } else {
      // Add same-denominator: e.g. "1/4 + 2/4 = ?/4" → 3
      const denoms=[3,4,5,6,8,10];
      const d = denoms[~~(Math.random()*denoms.length)];
      const n1 = ~~(Math.random()*(d-2))+1;
      const n2 = ~~(Math.random()*(d-n1-1))+1; // ensure sum < d
      if(n2<1){t=null;continue;}
      const sum = n1+n2;
      t = {
        display: `${n1}/${d} + ${n2}/${d} = ?/${d}`,
        a:`${n1}/${d}+${n2}/${d}`, b:`?/${d}`, op:'+',
        answer: String(sum), rawAnswer: undefined,
        isFraction: true, fracType: 2
      };
    }
  } while(!t||(lastQ&&lastQ.isFraction&&t.display===lastQ.display));
  return t;
}

function randomTask(lastQ){
  if(variant==='positive') return makePositiveTask(lastQ);
  if(variant==='negative') return makeNegativeTask(lastQ);
  if(variant==='decimal')  return makeDecimalTask(lastQ);
  if(variant==='fraction') return makeFractionTask(lastQ);
  if(variant==='mixed')    return Math.random()<.5?makePositiveTask(lastQ):makeNegativeTask(lastQ);
  if(variant==='mixed-frac'){
    const r=Math.random();
    if(r<.4) return makePositiveTask(lastQ);
    if(r<.7) return makeNegativeTask(lastQ);
    return makeFractionTask(lastQ);
  }
  if(variant==='custom' && window._customTopics?.length){
    const vars=window._customTopics;
    const v=vars[~~(Math.random()*vars.length)];
    if(v==='positive') return makePositiveTask(lastQ);
    if(v==='negative') return makeNegativeTask(lastQ);
    if(v==='decimal')  return makeDecimalTask(lastQ);
    if(v==='fraction') return makeFractionTask(lastQ);
  }
  // 'all': equal quarters
  const r=Math.random();
  if(r<.25) return makePositiveTask(lastQ);
  if(r<.50) return makeNegativeTask(lastQ);
  if(r<.75) return makeDecimalTask(lastQ);
  return makeFractionTask(lastQ);
}

// ── NUMPAD ──
function buildNumpad(padId,player){
  const pad=document.getElementById(padId); pad.innerHTML='';
  const needNeg=variant==='negative'||variant==='mixed'||variant==='all';
  const needDec=variant==='decimal'||variant==='all'||variant==='fraction';

  for(let i=1;i<=9;i++) addBtn(pad,'num-btn',String(i),()=>pressNum(player,String(i)));

  if(needDec && needNeg){
    // 'all': needs 0  ,  ±  ⌫  ✓  → 5 cols bottom row but we keep 4 cols grid, split into two rows
    addBtn(pad,'num-btn','0',()=>pressNum(player,'0'));
    addBtn(pad,'num-btn minus-btn',',',()=>pressComma(player));
    addBtn(pad,'num-btn minus-btn','±',()=>pressSign(player));
    addBtn(pad,'num-btn del','⌫',()=>pressNum(player,'del'));
    addBtn(pad,'num-btn ok','✓',()=>submitAnswer(player));
    pad.style.gridTemplateColumns='repeat(5,1fr)';
  } else if(needDec){
    // Layout 4 cols: 1-9, then: 0  ,  ⌫  ✓
    addBtn(pad,'num-btn','0',()=>pressNum(player,'0'));
    addBtn(pad,'num-btn minus-btn',',',()=>pressComma(player));
    addBtn(pad,'num-btn del','⌫',()=>pressNum(player,'del'));
    addBtn(pad,'num-btn ok','✓',()=>submitAnswer(player));
    pad.style.gridTemplateColumns='repeat(4,1fr)';
  } else if(needNeg){
    // Layout 4 cols: 1-9, then: 0  ±  ⌫  ✓
    addBtn(pad,'num-btn','0',()=>pressNum(player,'0'));
    addBtn(pad,'num-btn minus-btn','±',()=>pressSign(player));
    addBtn(pad,'num-btn del','⌫',()=>pressNum(player,'del'));
    addBtn(pad,'num-btn ok','✓',()=>submitAnswer(player));
    pad.style.gridTemplateColumns='repeat(4,1fr)';
  } else {
    // Layout 3 cols: 1-9, then: 0  ⌫  ✓
    addBtn(pad,'num-btn','0',()=>pressNum(player,'0'));
    addBtn(pad,'num-btn del','⌫',()=>pressNum(player,'del'));
    addBtn(pad,'num-btn ok','✓',()=>submitAnswer(player));
    pad.style.gridTemplateColumns='repeat(3,1fr)';
  }
}
function addBtn(pad,cls,label,action){
  const btn=document.createElement('button');
  btn.className=cls; btn.textContent=label;
  btn.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
  btn.addEventListener('click',action);
  pad.appendChild(btn);
}

// ── INPUT ──
function pressNum(player,val){
  if(finished[player]) return;
  const isDecimal=variant==='decimal'||variant==='all';
  if(val==='del'){
    if(!inputs[player].length&&needMinus[player]) needMinus[player]=false;
    else inputs[player]=inputs[player].slice(0,-1);
  } else {
    // count only digit characters (ignore comma) for length check
    const digitCount = inputs[player].replace(',','').length;
    const maxDigits = isDecimal ? 6 : 3;
    if(digitCount >= maxDigits) return;
    inputs[player]+=val;
  }
  updateDisplay(player);
}
function pressComma(player){
  if(finished[player]) return;
  if(inputs[player].includes(',')) return; // only one comma
  if(!inputs[player]) inputs[player]='0';
  inputs[player]+=',';
  updateDisplay(player);
}
function pressSign(player){if(finished[player])return;needMinus[player]=!needMinus[player];updateDisplay(player);}
function updateDisplay(player){
  const d=document.getElementById('display'+(player+1));
  const isDecimal=variant==='decimal';
  const sign=needMinus[player]?'−':'';
  let shown=inputs[player]?sign+inputs[player]:(sign||'_');
  d.textContent=shown;
  d.classList.toggle('has-value',!!inputs[player]||needMinus[player]);
}
function getInputValue(player){
  const q=currentQ[player];
  const needsCommaInput = q.rawAnswer!==undefined || (q.isFraction&&q.fracType===1);
  if(needsCommaInput){
    if(!inputs[player]) return null;
    return inputs[player];
  }
  const raw=parseInt(inputs[player]); if(isNaN(raw)) return null;
  return needMinus[player]?-Math.abs(raw):raw;
}
  return needMinus[player]?-Math.abs(raw):raw;
}

// ── ANSWER ──
function submitAnswer(player){
  if(finished[player]) return;
  const val=getInputValue(player); if(val===null) return;
  inputs[player]=''; needMinus[player]=false; updateDisplay(player);

  let ok;
  const isDecimalQ = currentQ[player].rawAnswer !== undefined;
  if(isDecimalQ){
    const norm=s=>String(s).replace(/,(\d*?)0+$/,',$1').replace(/,$/,'');
    const given = norm(String(val));
    const expected = norm(String(currentQ[player].answer));
    ok = given === expected;
  } else {
    ok = val === currentQ[player].answer;
  }
  const area=document.getElementById('area'+(player+1));
  if(ok){correct[player]++;streaks[player]++;area.classList.add('correct-flash');setTimeout(()=>area.classList.remove('correct-flash'),350);}
  else{
    wrong[player]++;streaks[player]=0;
    // save mistake: task string, what was entered, correct answer
    const q=currentQ[player];
    mistakes[player].push({task:`${q.a} ${q.op} ${q.b}`, given: needMinus[player]&&val!==null?'−'+inputs[player]:String(val??'–'), answer: q.answer});
    area.classList.add('wrong-flash');setTimeout(()=>area.classList.remove('wrong-flash'),300);
    const pen=document.getElementById('pen'+(player+1));pen.textContent='-1 ✗';clearTimeout(pen._t);pen._t=setTimeout(()=>pen.textContent='',900);
  }

  const net=correct[player]-wrong[player];
  document.getElementById('score'+(player+1)).textContent=net;
  document.getElementById('liveCorrect'+(player+1)).textContent=correct[player]+' ✓';
  document.getElementById('liveWrong'+(player+1)).textContent=wrong[player]+' ✗';
  document.getElementById('liveNet'+(player+1)).textContent='= '+net;
  const stk=document.getElementById('streak'+(player+1));
  if(streaks[player]>=3){stk.textContent='🔥 '+streaks[player]+'x!';stk.classList.add('active');}
  else{stk.textContent='';stk.classList.remove('active');}
  nextQuestion(player);
}

function nextQuestion(player){
  currentQ[player]=randomTask(currentQ[player]);
  const q=currentQ[player];
  const el=document.getElementById('q'+(player+1));
  if(q.isFraction){
    el.textContent = q.display;
  } else {
    el.textContent=q.a+' '+q.op+' '+q.b+' = ?';
  }
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

// ── TIMER ──
function formatTime(s){const m=~~(s/60),sec=s%60;return m>0?m+':'+String(sec).padStart(2,'0'):sec+'s';}
function startTimer(player){
  timeLeft[player]=selectedTime; updateTimerUI(player);
  timers[player]=setInterval(()=>{timeLeft[player]--;updateTimerUI(player);if(timeLeft[player]<=0){clearInterval(timers[player]);finishPlayer(player);}},1000);
}
function updateTimerUI(player){
  const bar=document.getElementById('bar'+(player+1)),txt=document.getElementById('timerText'+(player+1));
  const pct=(timeLeft[player]/selectedTime)*100;
  bar.style.width=pct+'%'; txt.textContent=formatTime(timeLeft[player]);
  bar.classList.remove('warning','critical');
  if(pct<=20) bar.classList.add('critical'); else if(pct<=40) bar.classList.add('warning');
}
function finishPlayer(player){
  finished[player]=true;
  document.getElementById('area'+(player+1)).classList.add('finished');
  const isTournament=gameMode==='solo_tournament';
  const done=isTournament||gameMode==='solo'?finished[0]:(finished[0]&&finished[1]);
  if(done) setTimeout(()=>{
    document.getElementById('game').classList.add('hidden');
    if(isTournament){
      tResults.push({name:names[0],correct:correct[0],wrong:wrong[0],net:correct[0]-wrong[0]});
      tCurrentIdx++;
      nextTournamentPlayer();
    } else showResult();
  },600);
}

// ── URL PARAMS FROM HUB ──
function readUrlParams(){
  const p=new URLSearchParams(window.location.search);
  if(!p.has('mode')) return; // no params, show normal setup

  const mode=p.get('mode')||'solo';
  const v=p.get('variant')||'positive';
  const time=parseInt(p.get('time')||'60');
  const topics=(p.get('topics')||'').split(',').filter(Boolean);

  // set globals
  selectedTime=time;
  gameMode=mode==='duell'?'duell':mode==='turnier'?'turnier':'solo';

  // handle custom multi-topic
  if(v==='custom' && topics.length){
    const varMap={rechnen:'positive',negativ:'negative',dezimal:'decimal',brueche:'fraction'};
    // pick random variant from selected topics each question
    window._customTopics=topics.map(t=>varMap[t]||'positive');
    variant='custom';
  } else if(v==='all'){
    variant='all';
  } else if(v==='mixed-frac'){
    variant='mixed-frac';
  } else {
    variant=v;
  }

  // hide setup, go straight to game or turnier
  if(gameMode==='turnier'){
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('tournamentSetup').classList.remove('hidden');
  } else {
    // auto-start
    names[0]='Spieler 1'; names[1]='Spieler 2';
    document.getElementById('name1').value='Spieler 1';
    document.getElementById('name2').value='Spieler 2';
    startGame();
  }
}

window.addEventListener('DOMContentLoaded', readUrlParams);

// ── NORMAL GAME START ──
function startGame(){
  if(gameMode==='turnier'){return;}
  names[0]=document.getElementById('name1').value.trim()||'Spieler 1';
  names[1]=document.getElementById('name2').value.trim()||'Spieler 2';
  correct=[0,0];wrong=[0,0];streaks=[0,0];inputs=['',''];needMinus=[false,false];finished=[false,false];

  const isSolo=gameMode==='solo';
  document.getElementById('area2').classList.toggle('hidden',isSolo);
  document.getElementById('gameDivider').classList.toggle('hidden',isSolo);
  document.getElementById('game').classList.toggle('solo-game', isSolo);
  const area1=document.getElementById('area1');
  const area2=document.getElementById('area2');
  area1.className='player-area '+(isSolo?'solo-area':'p1');
  area2.className='player-area p2'+(isSolo?' hidden':'');

  for(let p=0;p<2;p++){
    document.getElementById('score'+(p+1)).textContent='0';
    document.getElementById('liveCorrect'+(p+1)).textContent='0 ✓';
    document.getElementById('liveWrong'+(p+1)).textContent='0 ✗';
    document.getElementById('liveNet'+(p+1)).textContent='= 0';
    document.getElementById('streak'+(p+1)).textContent='';
    document.getElementById('pen'+(p+1)).textContent='';
    document.getElementById('area'+(p+1)).classList.remove('finished');
  }
  document.getElementById('pname1').textContent=names[0];
  document.getElementById('pname2').textContent=names[1];

  buildNumpad('pad1',0); if(!isSolo) buildNumpad('pad2',1);
  nextQuestion(0); if(!isSolo) nextQuestion(1);
  startTimer(0); if(!isSolo) startTimer(1);

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
}

// ── TOURNAMENT RESULT ──
function showTournamentResult(){
  tResults.sort((a,b)=>b.net-a.net||(a.wrong-b.wrong));
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('resultTitle').textContent='🏆 Turnier-Ergebnis';
  document.getElementById('resultCards').innerHTML='';
  document.getElementById('hsSectionWrap').classList.add('hidden');

  const ranking=document.getElementById('tournamentRanking');
  ranking.classList.remove('hidden');
  const medals=['🥇','🥈','🥉'];
  ranking.innerHTML=`<div class="t-ranking-header">🏆 RANGLISTE — ${tPlayers.length} Spieler</div>`+
    tResults.map((r,i)=>`<div class="t-rank-row ${i===0?'gold':''}">
      <div class="t-rank-num">${medals[i]||i+1}</div>
      <div class="t-rank-name">${r.name}</div>
      <div class="t-rank-pills">
        <span class="stat-pill stat-net" style="font-size:.8rem">${r.net} Pkt</span>
        <span class="stat-pill stat-correct" style="font-size:.75rem">${r.correct}✓</span>
        <span class="stat-pill stat-wrong" style="font-size:.75rem">${r.wrong}✗</span>
      </div>
    </div>`).join('');

  const btns=document.getElementById('resultBtns');
  btns.innerHTML=`
    <button class="btn-purple" onclick="restartTournament()">Turnier wiederholen 🔄</button>
    <button class="btn-gold" onclick="resetGame()">Hauptmenü 🏠</button>`;

  spawnConfetti();
}

function restartTournament(){
  document.getElementById('result').classList.add('hidden');
  document.getElementById('tournamentRanking').classList.add('hidden');
  document.getElementById('hsSectionWrap').classList.remove('hidden');
  tCurrentIdx=0; tResults=[];
  variant=tVariant; selectedTime=tTime;
  document.getElementById('tournamentSetup').classList.remove('hidden');
}

// ── NORMAL RESULT ──
function getHighscores(){try{return JSON.parse(localStorage.getItem('matheHS3')||'[]');}catch{return[];}}
function saveHighscores(hs){localStorage.setItem('matheHS3',JSON.stringify(hs));}
function addHS(name,net,c,w,dur,v){
  const hs=getHighscores();
  hs.push({name,net,correct:c,wrong:w,dur,variant:v,date:new Date().toLocaleDateString('de-DE')});
  hs.sort((a,b)=>b.net-a.net||(a.wrong-b.wrong)); hs.splice(10); saveHighscores(hs); return hs;
}
function clearHighscores(){if(confirm('Alle Highscores löschen?')){localStorage.removeItem('matheHS3');renderHS([],[]);}}
function renderHS(hs,nk){
  const tbl=document.getElementById('hsTable');
  if(!hs.length){tbl.innerHTML='<tr><td colspan="5" style="color:rgba(255,255,255,.3);text-align:center;padding:10px">Noch keine Einträge</td></tr>';return;}
  const vl={positive:'✅',negative:'➖',mixed:'🔀',decimal:'🔢',all:'🌀',fraction:'½'};
  tbl.innerHTML=`<tr><th>#</th><th>Name</th><th>Var.</th><th>Zeit</th><th class="pts">Pkt</th></tr>`+
    hs.map((e,i)=>`<tr class="${nk.includes(e.name+e.net+e.dur)?'new-entry':''}">
      <td class="rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td>${e.name}</td><td>${vl[e.variant]||''}</td><td>${formatTime(e.dur)}</td>
      <td class="pts">${e.net} <span style="font-size:.62rem;color:rgba(255,255,255,.25)">(${e.correct}✓${e.wrong}✗)</span></td>
    </tr>`).join('');
}

function renderMistakes(isSolo){
  const sec=document.getElementById('mistakesSection');
  sec.innerHTML='';
  const players=isSolo?[0]:[0,1];
  players.forEach(idx=>{
    const m=mistakes[idx];
    if(!m.length) return;
    const rows=m.map(e=>`<tr>
      <td class="m-task">${e.task} = ?</td>
      <td class="m-given">${e.given}</td>
      <td class="m-arrow">→</td>
      <td class="m-correct">${e.answer}</td>
    </tr>`).join('');
    sec.innerHTML+=`<div class="mistakes-block">
      <div class="mistakes-header">❌ Fehler von ${names[idx]} (${m.length})</div>
      <table class="mistakes-table"><tr>
        <th style="font-size:.7rem;color:rgba(255,255,255,.3);padding:4px 14px;text-align:left">Aufgabe</th>
        <th style="font-size:.7rem;color:rgba(255,255,255,.3);padding:4px 14px;text-align:left">Deine Antwort</th>
        <th></th>
        <th style="font-size:.7rem;color:rgba(255,255,255,.3);padding:4px 14px;text-align:left">Richtig</th>
      </tr>${rows}</table>
    </div>`;
  });
}

function showResult(){
  document.getElementById('tournamentRanking').classList.add('hidden');
  document.getElementById('hsSectionWrap').classList.remove('hidden');
  document.getElementById('result').classList.remove('hidden');

  const isSolo=gameMode==='solo';
  const net0=correct[0]-wrong[0],net1=correct[1]-wrong[1];
  let title;
  let hs,nk=[];
  if(isSolo){
    title='✅ Ergebnis';
    hs=addHS(names[0],net0,correct[0],wrong[0],selectedTime,variant); nk=[names[0]+net0+selectedTime];
  } else {
    title=net0>net1?'🏆 '+names[0]+' gewinnt!':net1>net0?'🏆 '+names[1]+' gewinnt!':'🤝 Unentschieden!';
    hs=addHS(names[0],net0,correct[0],wrong[0],selectedTime,variant);
    hs=addHS(names[1],net1,correct[1],wrong[1],selectedTime,variant);
    nk=[names[0]+net0+selectedTime,names[1]+net1+selectedTime];
  }
  document.getElementById('resultTitle').textContent=title;
  const p1w=!isSolo&&net0>net1,p2w=!isSolo&&net1>net0;
  const ch=(idx,cls,win)=>`<div class="result-card ${cls} ${win?'winner':''}">
    <div class="r-emoji">${isSolo?'⭐':win?'🥇':'🥈'}</div>
    <div class="r-name">${names[idx]}</div>
    <div class="r-score">${correct[idx]-wrong[idx]}</div>
    <div class="r-breakdown">
      <span class="r-correct">${correct[idx]} ✓</span>
      <span class="r-wrong">${wrong[idx]} ✗</span>
      <span class="r-minus">−${wrong[idx]} Straf</span>
    </div></div>`;
  let html=ch(0,isSolo?'solo':'p1',p1w);
  if(!isSolo) html+=`<div class="vs-badge">VS</div>`+ch(1,'p2',p2w);
  document.getElementById('resultCards').innerHTML=html;
  renderMistakes(isSolo);
  renderHS(hs,nk);

  const btns=document.getElementById('resultBtns');
  btns.innerHTML=`
    <button class="btn-gold" onclick="resetGame()">Nochmal 🔄</button>
    <button class="btn-dim" onclick="clearHighscores()">Highscores löschen</button>`;

  if(!isSolo&&net0!==net1||isSolo) spawnConfetti();
}

function spawnConfetti(){
  const colors=['#FF6B6B','#4ECDC4','#FFD93D','#a29bfe','#fd79a8','#00b894'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[~~(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}

function resetGame(){
  timers.forEach(t=>clearInterval(t));
  document.getElementById('game').classList.remove('solo-game');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('tournamentRanking').classList.add('hidden');
  document.getElementById('hsSectionWrap').classList.remove('hidden');
  document.getElementById('mistakesSection').innerHTML='';
  document.getElementById('setup').classList.remove('hidden');
  gameMode='duell';
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnDuell').classList.add('active');
  document.getElementById('card2').classList.remove('dimmed');
}
