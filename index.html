<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MatheArena</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --gold:#FFD93D;--purple:#a29bfe;--green:#2ecc71;--red:#ff4444;
    --blue:#74b9ff;--pink:#fd79a8;--teal:#4ECDC4;--orange:#e17055;
    --mid:#2c2c3e;--dark:#1a1a2e;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Nunito',sans-serif}

  /* ── SCREENS ── */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}
  .screen.hidden{display:none}

  /* ── TOP BAR ── */
  .topbar{display:flex;align-items:center;padding:16px 20px 8px;gap:12px;flex-shrink:0}
  .topbar h1{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--gold);flex:1}
  .topbar .back-btn{background:rgba(255,255,255,.08);border:none;border-radius:12px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:.95rem;color:rgba(255,255,255,.6);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .topbar .streak{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--gold);background:rgba(255,217,61,.1);border-radius:20px;padding:6px 14px}

  /* ── SCROLL CONTENT ── */
  .scroll{flex:1;overflow-y:auto;padding:0 16px 24px;-webkit-overflow-scrolling:touch}

  /* ── HOME ── */
  #home{background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%)}

  .daily-card{background:linear-gradient(135deg,rgba(162,155,254,.2),rgba(116,185,255,.15));border:2px solid rgba(162,155,254,.3);border-radius:20px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
  .daily-card:active{transform:scale(.98)}
  .daily-card .icon{font-size:2.5rem;flex-shrink:0}
  .daily-card .info h3{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--purple)}
  .daily-card .info p{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:2px}
  .daily-card .arrow{font-size:1.5rem;color:var(--purple);margin-left:auto}

  .section-title{font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;margin:16px 0 10px}

  /* topic grid */
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
  .topic-card{border-radius:20px;padding:18px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:8px;border:2px solid transparent}
  .topic-card:active{transform:scale(.96)}
  .topic-card .t-icon{font-size:2.2rem}
  .topic-card .t-name{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;line-height:1.2}
  .topic-card .t-sub{font-size:.75rem;opacity:.6;color:#fff;line-height:1.3}
  .topic-card .t-badge{font-family:'Fredoka One',cursive;font-size:.7rem;border-radius:20px;padding:2px 8px;width:fit-content}

  /* topic colors */
  .tc-rechnen{background:linear-gradient(135deg,#2d1b5e,#3d2b7e);border-color:rgba(162,155,254,.3)}
  .tc-negativ{background:linear-gradient(135deg,#1e3a4a,#1e4a6a);border-color:rgba(116,185,255,.3)}
  .tc-dezimal{background:linear-gradient(135deg,#1a3a2a,#1a5a3a);border-color:rgba(46,204,113,.3)}
  .tc-brueche{background:linear-gradient(135deg,#3a2a1a,#5a3a1a);border-color:rgba(225,112,85,.3)}
  .tc-formeln{background:linear-gradient(135deg,#3a1a2a,#5a1a3a);border-color:rgba(253,121,168,.3)}
  .tc-formen{background:linear-gradient(135deg,#1a2a3a,#1a3a5a);border-color:rgba(116,185,255,.3)}

  /* kombination card */
  .kombi-card{background:linear-gradient(135deg,rgba(255,217,61,.12),rgba(253,121,168,.08));border:2px solid rgba(255,217,61,.2);border-radius:20px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s;margin-bottom:8px}
  .kombi-card:active{transform:scale(.98)}
  .kombi-card .k-icon{font-size:2rem;flex-shrink:0}
  .kombi-card .k-info h3{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold)}
  .kombi-card .k-info p{font-size:.8rem;color:rgba(255,255,255,.45);margin-top:2px}
  .kombi-card .arrow{font-size:1.3rem;color:var(--gold);margin-left:auto}

  /* ── TOPIC SCREEN ── */
  #topic{background:linear-gradient(180deg,#1a1a2e,#16213e)}
  .topic-hero{padding:8px 20px 16px;display:flex;align-items:center;gap:14px}
  .topic-hero .big-icon{font-size:3rem}
  .topic-hero h2{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff}
  .topic-hero p{font-size:.85rem;color:rgba(255,255,255,.45);margin-top:2px}

  /* mode cards */
  .mode-grid{display:flex;flex-direction:column;gap:10px}
  .mode-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
  .mode-card:active{transform:scale(.98)}
  .mode-card .m-icon{font-size:1.8rem;flex-shrink:0}
  .mode-card .m-info h3{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff}
  .mode-card .m-info p{font-size:.78rem;color:rgba(255,255,255,.4);margin-top:2px}
  .mode-card .m-arrow{font-size:1.2rem;color:rgba(255,255,255,.3);margin-left:auto}
  .mode-card.highlight{border-color:rgba(255,217,61,.4);background:rgba(255,217,61,.06)}
  .mode-card.highlight .m-info h3{color:var(--gold)}

  /* variant pills */
  .variant-section{margin-top:16px}
  .variant-section .section-title{margin-top:0}
  .variant-pills{display:flex;flex-wrap:wrap;gap:8px}
  .v-pill{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:50px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;color:rgba(255,255,255,.6);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
  .v-pill.selected{color:#1a1a2e;box-shadow:0 4px 12px rgba(255,217,61,.3)}
  .v-pill:active{transform:scale(.95)}

  /* ── CUSTOM BUILDER ── */
  #custom{background:linear-gradient(180deg,#1a1a2e,#16213e)}
  .custom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .custom-topic{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
  .custom-topic.sel{border-color:var(--gold);background:rgba(255,217,61,.08)}
  .custom-topic .ct-icon{font-size:1.6rem;flex-shrink:0}
  .custom-topic .ct-name{font-family:'Fredoka One',cursive;font-size:.95rem;color:#fff}
  .custom-topic .ct-check{margin-left:auto;font-size:1.2rem;opacity:0;transition:opacity .2s}
  .custom-topic.sel .ct-check{opacity:1}

  .build-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:14px;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;width:100%;box-shadow:0 8px 24px rgba(255,217,61,.35);transition:transform .15s;margin-top:16px}
  .build-btn:active{transform:scale(.97)}
  .build-btn:disabled{opacity:.4;pointer-events:none}

  /* ── GAME LAUNCHER ── */
  #launcher{background:linear-gradient(180deg,#1a1a2e,#16213e);align-items:center;justify-content:center;gap:20px;padding:24px}
  .launcher-title{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;text-align:center}
  .launcher-sub{font-size:.9rem;color:rgba(255,255,255,.4);text-align:center}

  .time-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .t-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 20px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .t-btn.sel{background:var(--gold);border-color:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.35)}

  .launch-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:16px 56px;font-family:'Fredoka One',cursive;font-size:1.5rem;cursor:pointer;box-shadow:0 8px 28px rgba(255,217,61,.4);transition:transform .15s}
  .launch-btn:active{transform:scale(.96)}

  /* daily countdown screen */
  #dailyCountdown{background:linear-gradient(135deg,#1a1a2e,#0f3460);align-items:center;justify-content:center;gap:12px}
  .dc-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
  .dc-theme{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--gold);text-align:center}
  .dc-time{font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,255,255,.4)}
  .dc-num{font-family:'Fredoka One',cursive;font-size:9rem;color:#fff;line-height:1;text-shadow:0 0 60px rgba(255,217,61,.5);animation:dcPop .7s ease}
  @keyframes dcPop{0%{transform:scale(1.4);opacity:0}100%{transform:scale(1);opacity:1}}
</head>
<body>

<!-- ══ DAILY COUNTDOWN ══ -->
<div id="dailyCountdown" class="screen hidden">
  <div class="dc-title">⭐ Tagesherausforderung</div>
  <div class="dc-theme" id="dcTheme">Gemischt</div>
  <div class="dc-time" id="dcTime">2 Minuten</div>
  <div class="dc-num" id="dcNum">3</div>
</div>

<!-- ══ HOME ══ -->
<div id="home" class="screen">
  <div class="topbar">
    <h1>⚔️ MatheArena</h1>
    <div class="streak" id="streakBadge">🔥 0</div>
  </div>
  <div class="scroll">

    <!-- Tagesherausforderung -->
    <div class="daily-card" onclick="startDaily()">
      <div class="icon">⭐</div>
      <div class="info">
        <h3>Tagesherausforderung</h3>
        <p id="dailySub">Zufälliges Thema · Zufällige Zeit</p>
      </div>
      <div class="arrow" style="font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold)">START ›</div>
    </div>

    <div class="section-title">📚 Themen</div>

    <div class="topic-grid">
      <div class="topic-card tc-rechnen" onclick="openTopic('rechnen')">
        <div class="t-icon">🔢</div>
        <div class="t-name">Rechnen</div>
        <div class="t-sub">+ − × ÷<br>positiv, negativ, dezimal</div>
      </div>
      <div class="topic-card tc-brueche" onclick="openTopic('brueche')">
        <div class="t-icon">½</div>
        <div class="t-name">Brüche</div>
        <div class="t-sub">Kürzen, addieren<br>Bruch ↔ Dezimal</div>
      </div>
      <div class="topic-card tc-formeln" onclick="openTopic('formeln')">
        <div class="t-icon">📐</div>
        <div class="t-name">Formeln</div>
        <div class="t-sub">Umstellen<br>Fläche, Volumen</div>
      </div>
      <div class="topic-card tc-formen" onclick="openTopic('formen')">
        <div class="t-icon">🔷</div>
        <div class="t-name">Formen & Körper</div>
        <div class="t-sub">Erkennen<br>Eigenschaften</div>
      </div>
      <div class="topic-card tc-formeln" onclick="window.location.href='binom.html'" style="border-color:rgba(78,205,196,.3);background:linear-gradient(135deg,#0d2a29,#1a3a38)">
        <div class="t-icon">🔣</div>
        <div class="t-name">Binomische Formeln</div>
        <div class="t-sub">(a+b)² · (a-b)²<br>(a+b)(a-b)</div>
      </div>
      <div class="topic-card tc-rechnen" onclick="window.location.href='gleichungen.html'" style="border-color:rgba(255,107,107,.3);background:linear-gradient(135deg,#2a1515,#3a1a1a)">
        <div class="t-icon">🔡</div>
        <div class="t-name">Gleichungen</div>
        <div class="t-sub">x ausrechnen<br>3x+5 = 2x+12</div>
      </div>
    </div>

    <div class="section-title">🎯 Kombiniert</div>

    <div class="kombi-card" onclick="openCustom()">
      <div class="k-icon">⚙️</div>
      <div class="k-info">
        <h3>Eigene Auswahl</h3>
        <p>Wähle selbst welche Themen du mischen möchtest</p>
      </div>
      <div class="arrow">›</div>
    </div>

    <div class="kombi-card" onclick="openKombi('alles')">
      <div class="k-icon">🌀</div>
      <div class="k-info">
        <h3>Alles gemischt</h3>
        <p>Alle Themen zufällig kombiniert</p>
      </div>
      <div class="arrow">›</div>
    </div>

  </div>
</div>

<!-- ══ TOPIC ══ -->
<div id="topic" class="screen hidden">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Zurück</button>
    <h1 id="topicTitle">Rechnen</h1>
  </div>
  <div class="scroll">
    <div class="topic-hero">
      <div class="big-icon" id="topicIcon">🔢</div>
      <div>
        <h2 id="topicName">Rechnen</h2>
        <p id="topicDesc">Alle Grundrechenarten</p>
      </div>
    </div>

    <div class="section-title">🎮 Modus</div>
    <div class="mode-grid">
      <div class="mode-card highlight" onclick="selectMode('solo')">
        <div class="m-icon">🧑</div>
        <div class="m-info"><h3>Üben</h3><p>Alleine auf Zeit üben</p></div>
        <div class="m-arrow">›</div>
      </div>
      <div class="mode-card" onclick="selectMode('duell')">
        <div class="m-icon">⚔️</div>
        <div class="m-info"><h3>Duell</h3><p>Gegen jemanden spielen</p></div>
        <div class="m-arrow">›</div>
      </div>
      <div class="mode-card" onclick="selectMode('turnier')">
        <div class="m-icon">🏆</div>
        <div class="m-info"><h3>Turnier</h3><p>Ganze Klasse nacheinander</p></div>
        <div class="m-arrow">›</div>
      </div>
    </div>

    <div class="variant-section" id="variantSection">
      <div class="section-title">📐 Variante</div>
      <div class="variant-pills" id="variantPills"></div>
    </div>
  </div>
</div>

<!-- ══ CUSTOM ══ -->
<div id="custom" class="screen hidden">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Zurück</button>
    <h1>⚙️ Eigene Auswahl</h1>
  </div>
  <div class="scroll">
    <div class="section-title">📂 Weitere Themen</div>
    <div class="custom-grid" id="directGrid"></div>
    <div class="section-title" style="margin-top:18px">🔀 Themen kombinieren</div>
    <p style="font-size:.78rem;color:rgba(255,255,255,.35);margin-bottom:10px">Mind. 2 auswählen</p>
    <div class="custom-grid" id="customGrid"></div>
    <button class="build-btn" id="buildBtn" onclick="launchCustom()" disabled>Starten →</button>
  </div>
</div>

<!-- ══ LAUNCHER ══ -->
<div id="launcher" class="screen hidden">
  <div class="launcher-title" id="launchTitle">Rechnen – Üben</div>
  <div class="launcher-sub" id="launchSub">Wähle die Spielzeit</div>
  <div class="time-row">
    <button class="t-btn" data-s="30" onclick="selTime(this)">30 Sek</button>
    <button class="t-btn sel" data-s="60" onclick="selTime(this)">1 Min</button>
    <button class="t-btn" data-s="120" onclick="selTime(this)">2 Min</button>
    <button class="t-btn" data-s="300" onclick="selTime(this)">5 Min</button>
  </div>
  <button class="launch-btn" onclick="doLaunch()">Los geht's! 🚀</button>
  <button style="background:none;border:none;color:rgba(255,255,255,.3);font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer" onclick="goHome()">← Zurück</button>
</div>

<script>
// ── TOPICS CONFIG ──
const TOPICS = {
  rechnen: {
    icon:'🔢', name:'Rechnen', desc:'Grundrechenarten + − × ÷',
    multiVariant: true, // allow multi-select
    variants:[
      {id:'positive', label:'✅ Positiv'},
      {id:'negative', label:'➖ Negativ'},
      {id:'decimal',  label:'🔟 Dezimalzahlen'},
    ]
  },
  formeln: {
    icon:'📐', name:'Formeln umstellen', desc:'Fläche, Volumen, Umfang',
    variants:[], // opens formeln.html
    external:'formeln.html'
  },
  formen: {
    icon:'🔷', name:'Formen & Körper', desc:'Erkennen & Eigenschaften',
    variants:[], // opens formen.html
    external:'formen.html'
  },
};

// Direct-start options (single tap → go)
const DIRECT_TOPICS = [
  {id:'formeln',    icon:'📐', name:'Formeln',           external:'formeln.html'},
  {id:'formen',     icon:'🔷', name:'Formen & Körper',   external:'formen.html'},
  {id:'binom',      icon:'🔣', name:'Binomische Formeln', external:'binom.html'},
  {id:'gleichungen',icon:'🔡', name:'Gleichungen',        external:'gleichungen.html'},
];
// Combinable options (multi-select, min 2)
const CUSTOM_TOPICS = [
  {id:'positive', icon:'✅', name:'Positiv',        variant:'positive'},
  {id:'negative', icon:'➖', name:'Negativ',         variant:'negative'},
  {id:'decimal',  icon:'🔟', name:'Dezimalzahlen',   variant:'decimal'},
  {id:'fraction', icon:'½',  name:'Brüche',           variant:'fraction'},
  {id:'mixed',    icon:'🔀', name:'Gemischt +/−',    variant:'mixed'},
];

// ── STATE ──
let currentTopic = null;
let currentMode  = 'solo';
let currentVariant = null;
let launchTime   = 60;
let launchTarget = {}; // {mode, variant, topics[]}
let customSelected = new Set();

// ── STREAK ──
function loadStreak(){
  const d=localStorage.getItem('mathStreak')||'{}';
  try{ return JSON.parse(d); }catch{ return {}; }
}
function updateStreakBadge(){
  const s=loadStreak();
  document.getElementById('streakBadge').textContent='🔥 '+( s.count||0);
}
function bumpStreak(){
  const s=loadStreak();
  const today=new Date().toDateString();
  if(s.lastDay===today){ return; }
  s.count=(s.count||0)+1;
  s.lastDay=today;
  localStorage.setItem('mathStreak',JSON.stringify(s));
}

// ── DAILY ──
const DAILY_VARIANTS=['positive','negative','mixed','decimal','fraction','all'];
const DAILY_THEMES=[
  {label:'➕ Positiv',      variant:'positive'},
  {label:'➖ Negativ',      variant:'negative'},
  {label:'🔀 Gemischt',    variant:'mixed'},
  {label:'🔟 Dezimalzahlen',variant:'decimal'},
  {label:'½ Brüche',        variant:'fraction'},
  {label:'🌀 Alles',        variant:'all'},
];
const DAILY_TIMES=[30,60,120,180];

function startDaily(){
  // Pick random theme and time based on today's date + random seed
  const seed=new Date().getDate();
  const theme=DAILY_THEMES[seed % DAILY_THEMES.length];
  const time=DAILY_TIMES[Math.floor(seed*7) % DAILY_TIMES.length];
  const timeLabel=time<60?time+'s':time/60+' Min';

  launchTarget={mode:'solo', variant:theme.variant, topics:[], title:'⭐ Tagesherausforderung'};
  launchTime=time;

  // Show countdown
  document.getElementById('dcTheme').textContent=theme.label;
  document.getElementById('dcTime').textContent=timeLabel+' · Los!';
  showScreen('dailyCountdown');

  let n=3;
  const el=document.getElementById('dcNum');
  el.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n>0){
      el.textContent=n;
      el.style.animation='none'; void el.offsetWidth; el.style.animation='dcPop .7s ease';
    } else {
      clearInterval(iv);
      el.textContent='🚀';
      setTimeout(()=>{ bumpStreak(); doLaunch(); },600);
    }
  },900);
}

// ── HOME ──
function goHome(){
  showScreen('home');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── TOPIC ──
function openTopic(tid){
  const t=TOPICS[tid];
  if(!t) return;
  if(t.external){ window.location.href=t.external; return; }
  currentTopic=tid;
  currentVariant=t.variants[0]?.id||null;
  currentMode='solo';

  document.getElementById('topicTitle').textContent=t.name;
  document.getElementById('topicIcon').textContent=t.icon;
  document.getElementById('topicName').textContent=t.name;
  document.getElementById('topicDesc').textContent=t.desc;

  // render variants
  const pills=document.getElementById('variantPills');
  const sec=document.getElementById('variantSection');
  if(t.variants.length){
    if(t.multiVariant){
      // multi-select: start with first selected
      currentVariantSet=new Set([t.variants[0].id]);
      pills.innerHTML=`
        <div style="font-size:.78rem;color:rgba(255,255,255,.35);width:100%;margin-bottom:4px">Mehrere wählbar — mind. 1</div>
        `+t.variants.map(v=>`
        <div class="v-pill${currentVariantSet.has(v.id)?' selected':''}"
             style="${currentVariantSet.has(v.id)?'background:var(--gold);color:#1a1a2e':''}"
             data-vid="${v.id}"
             onclick="toggleVariant('${v.id}',this)">${v.label}</div>
      `).join('');
    } else {
      currentVariantSet=new Set([t.variants[0].id]);
      pills.innerHTML=t.variants.map(v=>`
        <div class="v-pill${v.id===t.variants[0].id?' selected':''}"
             style="${v.id===t.variants[0].id?'background:var(--gold);color:#1a1a2e':''}"
             data-vid="${v.id}"
             onclick="selectVariant('${v.id}',this)">${v.label}</div>
      `).join('');
    }
    sec.style.display='block';
  } else {
    sec.style.display='none';
  }

  showScreen('topic');
}

let currentVariantSet = new Set(['positive']);

function toggleVariant(vid, btn){
  if(currentVariantSet.has(vid)){
    if(currentVariantSet.size===1) return; // keep at least 1
    currentVariantSet.delete(vid);
    btn.classList.remove('selected');
    btn.style.background=''; btn.style.color='';
  } else {
    currentVariantSet.add(vid);
    btn.classList.add('selected');
    btn.style.background='var(--gold)'; btn.style.color='#1a1a2e';
  }
}

function selectVariant(vid, btn){
  currentVariantSet=new Set([vid]);
  document.querySelectorAll('.v-pill').forEach(p=>{
    p.classList.remove('selected');
    p.style.background=''; p.style.color='';
  });
  btn.classList.add('selected');
  btn.style.background='var(--gold)'; btn.style.color='#1a1a2e';
}

function selectMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('highlight'));
  event.currentTarget.classList.add('highlight');

  const t=TOPICS[currentTopic];
  const modeLabel={solo:'Üben',duell:'Duell',turnier:'Turnier'}[mode];

  // compute final variant from set
  let finalVariant;
  const vArr=[...currentVariantSet];
  if(vArr.length===1){
    finalVariant=vArr[0];
  } else if(vArr.includes('positive')&&vArr.includes('negative')&&vArr.includes('decimal')){
    finalVariant='all';
  } else if(vArr.includes('positive')&&vArr.includes('negative')){
    finalVariant='mixed';
  } else if(vArr.includes('positive')&&vArr.includes('decimal')){
    finalVariant='custom'; window._customTopics=['positive','decimal'];
  } else if(vArr.includes('negative')&&vArr.includes('decimal')){
    finalVariant='custom'; window._customTopics=['negative','decimal'];
  } else {
    finalVariant=vArr[0];
  }

  const title=t.icon+' '+t.name+' · '+modeLabel;
  launchTarget={mode, variant:finalVariant, topics:[], title};
  showLauncher(title, vArr.map(v=>({positive:'Positiv',negative:'Negativ',decimal:'Dezimal',fraction:'Brüche'}[v]||v)).join(' + '));
}

// ── KOMBIS ──
function openKombi(type){
  let title, variant, sub;
  if(type==='alles'){
    title='🌀 Alles gemischt'; variant='all'; sub='Alle Themen kombiniert';
  } else if(type==='rechnen-brueche'){
    title='🔢½ Rechnen + Brüche'; variant='mixed-frac'; sub='Grundrechnen & Brüche';
  }
  launchTarget={mode:'solo', variant, topics:[], title};
  showLauncher(title, sub);
}

// ── CUSTOM ──
function openCustom(){
  customSelected.clear();

  // Direct grid
  document.getElementById('directGrid').innerHTML=DIRECT_TOPICS.map(t=>`
    <div class="custom-topic" onclick="${t.external?`window.location.href='${t.external}'`:`startDirect('${t.id}')`}" style="cursor:pointer">
      <div class="ct-icon">${t.icon}</div>
      <div class="ct-name">${t.name}</div>
      <div class="ct-check" style="opacity:1;color:var(--gold)">›</div>
    </div>
  `).join('');

  // Combine grid
  document.getElementById('customGrid').innerHTML=CUSTOM_TOPICS.map(t=>`
    <div class="custom-topic" id="ct-${t.id}" onclick="toggleCustom('${t.id}')">
      <div class="ct-icon">${t.icon}</div>
      <div class="ct-name">${t.name}</div>
      <div class="ct-check">✓</div>
    </div>
  `).join('');

  document.getElementById('buildBtn').disabled=true;
  showScreen('custom');
}

function startDirect(id){
  const t=DIRECT_TOPICS.find(x=>x.id===id);
  if(!t) return;
  launchTarget={mode:'solo', variant:t.variant, topics:[], title:t.icon+' '+t.name};
  showLauncher(t.icon+' '+t.name, '');
}
function toggleCustom(id){
  const el=document.getElementById('ct-'+id);
  if(customSelected.has(id)){ customSelected.delete(id); el.classList.remove('sel'); }
  else{ customSelected.add(id); el.classList.add('sel'); }
  document.getElementById('buildBtn').disabled=customSelected.size<2;
}
function launchCustom(){
  const selected=[...customSelected];
  // if only external selected, go there directly
  const ext=CUSTOM_TOPICS.find(t=>selected.includes(t.id)&&t.external);
  if(selected.length===1 && ext){ window.location.href=ext.external; return; }
  // filter out externals for mixed game
  const gameTopics=selected.filter(id=>!CUSTOM_TOPICS.find(t=>t.id===id&&t.external));
  const title='⚙️ '+selected.map(id=>CUSTOM_TOPICS.find(t=>t.id===id)?.icon).join(' ');
  if(gameTopics.length===0){ window.location.href=ext?.external||'index.html'; return; }
  launchTarget={mode:'solo', variant:'custom', topics:gameTopics, title};
  showLauncher(title, selected.length+' Themen');
}

// ── LAUNCHER ──
function showLauncher(title, sub){
  document.getElementById('launchTitle').textContent=title;
  document.getElementById('launchSub').textContent=sub;
  showScreen('launcher');
}
function selTime(btn){
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  launchTime=parseInt(btn.dataset.s);
}
function doLaunch(){
  bumpStreak();
  // Build URL params and go to game
  const p=new URLSearchParams({
    mode: launchTarget.mode,
    variant: launchTarget.variant||'positive',
    time: launchTime,
    topics: launchTarget.topics.join(','),
    title: launchTarget.title||''
  });
  window.location.href='index.html?'+p.toString();
}

// ── INIT ──
updateStreakBadge();
// Unregister old service workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
}
</script>
