<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Formeln Umstellen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#FFD93D;--purple:#a29bfe;--green:#2ecc71;--red:#ff4444;--mid:#2c2c3e}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--mid);font-family:'Nunito',sans-serif;touch-action:none}

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
  .screen.hidden{display:none}

  /* SETUP */
  #setup{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
  #setup h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,5vw,3rem);color:var(--gold);text-shadow:0 4px 20px rgba(255,217,61,.4)}
  .setup-row{display:flex;flex-direction:column;align-items:center;gap:8px}
  .setup-row span{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4)}
  .btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .sel-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 18px;font-family:'Fredoka One',cursive;font-size:1rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .sel-btn.active{background:var(--gold);border-color:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.35)}
  .start-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:14px 48px;font-family:'Fredoka One',cursive;font-size:1.4rem;cursor:pointer;box-shadow:0 8px 28px rgba(255,217,61,.4);transition:transform .15s}
  .start-btn:active{transform:scale(.96)}

  /* GAME */
  #game{background:linear-gradient(135deg,#1a1a2e,#0f3460);justify-content:space-between;padding:20px}
  .game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:700px}
  .score-display{font-family:'Fredoka One',cursive;font-size:1.1rem;color:rgba(255,255,255,.5)}
  .score-display span{color:var(--gold);font-size:1.4rem}
  .progress-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:0 16px}
  .progress-bar{height:100%;background:var(--purple);border-radius:4px;transition:width .4s}

  .question-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:24px;padding:24px 32px;width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .shape-tag{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--purple);text-transform:uppercase;letter-spacing:2px}
  .formula-given{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,3.5vw,2.2rem);color:#fff;text-align:center;background:rgba(255,255,255,.08);border-radius:16px;padding:16px 24px;width:100%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;line-height:2.2}
  .formula-ask{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,2.5vw,1.5rem);color:var(--gold);text-align:center}

  /* fraction bar */
  .mf{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px;line-height:1.1}
  .mf .n{border-bottom:2.5px solid currentColor;padding:1px 10px 4px;text-align:center;white-space:nowrap;width:100%}
  .mf .d{padding:4px 10px 1px;text-align:center;white-space:nowrap;width:100%}
  i{font-style:normal;font-family:'Nunito',sans-serif;font-weight:900;font-size:1em}

  /* sqrt wrapper */
  .msqrt{display:inline-flex;align-items:center;vertical-align:middle;gap:2px}
  .msqrt .sqsign{font-size:1.4em;line-height:1;margin-right:1px}
  .msqrt .sqbody{border-top:2.5px solid currentColor;padding:2px 6px 0}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:700px}
  .choice-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:18px;padding:14px 10px;font-family:'Fredoka One',cursive;font-size:clamp(.9rem,2vw,1.25rem);color:#fff;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.8;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:3px}
  .choice-btn:active{transform:scale(.97)}
  .choice-btn.correct{background:rgba(46,204,113,.25);border-color:var(--green);color:var(--green);animation:correctPop .4s ease}
  .choice-btn.wrong{background:rgba(255,68,68,.2);border-color:var(--red);color:var(--red);animation:wrongShake .3s ease}
  .choice-btn.reveal{background:rgba(46,204,113,.15);border-color:rgba(46,204,113,.4);color:rgba(46,204,113,.8)}
  .choice-btn:disabled{cursor:default}
  /* fraction bars in answer buttons */
  .choice-btn .mf .n{border-bottom-color:currentColor}
  @keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
  @keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  .feedback{font-family:'Fredoka One',cursive;font-size:1.1rem;min-height:28px;text-align:center}
  .feedback.ok{color:var(--green)}.feedback.nok{color:var(--red)}

  /* RESULT */
  #result{background:linear-gradient(135deg,#1a1a2e,#0f3460)}
  #result h2{font-family:'Fredoka One',cursive;font-size:clamp(2rem,5vw,3rem);color:var(--gold)}
  .result-score{font-family:'Fredoka One',cursive;font-size:5rem;color:#fff;line-height:1}
  .result-sub{font-size:1rem;color:rgba(255,255,255,.4);font-family:'Fredoka One',cursive}
  .result-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:13px 44px;font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 24px rgba(255,217,61,.4);transition:transform .15s}
  .result-btn:active{transform:scale(.96)}
  .confetti-piece{position:fixed;border-radius:2px;animation:confettiFall linear forwards;z-index:999;pointer-events:none}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen">
  <h1>📐 Formeln Umstellen</h1>
  <div class="setup-row">
    <span>📦 Thema</span>
    <div class="btn-group" id="topicBtns">
      <button class="sel-btn active" data-t="all">Alles</button>
      <button class="sel-btn" data-t="2d">Fläche & Umfang</button>
      <button class="sel-btn" data-t="3d">Volumen & Oberfläche</button>
    </div>
  </div>
  <div class="setup-row">
    <span>🎯 Anzahl Aufgaben</span>
    <div class="btn-group" id="countBtns">
      <button class="sel-btn" data-c="10">10</button>
      <button class="sel-btn active" data-c="20">20</button>
      <button class="sel-btn" data-c="30">30</button>
    </div>
  </div>
  <button class="start-btn" onclick="startFormelGame()">Los geht's! 🚀</button>
  <button style="background:none;border:none;color:rgba(255,255,255,.3);font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer" onclick="goBack()">← Zurück</button>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
  <div class="game-header">
    <div class="score-display">✓ <span id="scoreVal">0</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="score-display" id="qCounter">1 / 20</div>
  </div>
  <div class="question-card">
    <div class="shape-tag" id="shapeTag">Rechteck</div>
    <div class="formula-given" id="formulaGiven"></div>
    <div class="formula-ask" id="formulaAsk"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen hidden">
  <div style="font-size:3rem">🏆</div>
  <h2>Ergebnis</h2>
  <div class="result-score" id="finalScore">0</div>
  <div class="result-sub" id="finalSub">von 20 richtig</div>
  <button class="result-btn" onclick="restartFormel()">Nochmal 🔄</button>
  <button style="background:none;border:none;color:rgba(255,255,255,.3);font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;margin-top:8px" onclick="goBack()">← Zurück</button>
</div>

<script>
// ── HELPERS ──
const f=(n,d)=>`<span class="mf"><span class="n">${n}</span><span class="d">${d}</span></span>`;

// fmt: only handle superscripts and pi — fractions are pre-built with f()
function fmt(s){
  let h = s;
  h = h.replace(/²/g,'<sup>2</sup>').replace(/³/g,'<sup>3</sup>');
  h = h.replace(/π/g,'<i>π</i>');
  return h;
}

// ── FORMEL-DATENBANK ──
const FORMELN=[
  // RECHTECK
  {shape:'Rechteck',emoji:'▭',type:'2d',
   fml:`A = a · b`,ask:'a',ans:`a = ${f('A','b')}`,
   w:[`a = A · b`,`a = ${f('b','A')}`,`a = A + b`]},
  {shape:'Rechteck',emoji:'▭',type:'2d',
   fml:`A = a · b`,ask:'b',ans:`b = ${f('A','a')}`,
   w:[`b = A · a`,`b = ${f('a','A')}`,`b = A − a`]},
  {shape:'Rechteck',emoji:'▭',type:'2d',
   fml:`U = 2 · (a + b)`,ask:'a',ans:`a = ${f('U','2')} − b`,
   w:[`a = U · 2 + b`,`a = ${f('U','2')} + b`,`a = U − 2 · b`]},
  {shape:'Rechteck',emoji:'▭',type:'2d',
   fml:`U = 2 · (a + b)`,ask:'b',ans:`b = ${f('U','2')} − a`,
   w:[`b = ${f('U','2')} + a`,`b = U · 2 − a`,`b = U − 2 · a`]},

  // QUADRAT
  {shape:'Quadrat',emoji:'■',type:'2d',
   fml:`A = a²`,ask:'a',ans:`a = √A`,
   w:[`a = A²`,`a = ${f('A','2')}`,`a = 2 · A`]},
  {shape:'Quadrat',emoji:'■',type:'2d',
   fml:`U = 4 · a`,ask:'a',ans:`a = ${f('U','4')}`,
   w:[`a = U · 4`,`a = U − 4`,`a = ${f('U','2')}`]},

  // DREIECK
  {shape:'Dreieck',emoji:'△',type:'2d',
   fml:`A = ${f('g · h','2')}`,ask:'g',ans:`g = ${f('2 · A','h')}`,
   w:[`g = A · ${f('h','2')}`,`g = 2 · A · h`,`g = ${f('A','2 · h')}`]},
  {shape:'Dreieck',emoji:'△',type:'2d',
   fml:`A = ${f('g · h','2')}`,ask:'h',ans:`h = ${f('2 · A','g')}`,
   w:[`h = A · ${f('g','2')}`,`h = ${f('g','2 · A')}`,`h = 2 · A · g`]},

  // KREIS
  {shape:'Kreis',emoji:'○',type:'2d',
   fml:`A = π · r²`,ask:'r',ans:`r = √${f('A','π')}`,
   w:[`r = ${f('A','π')}`,`r = A · π`,`r = √(A · π)`]},
  {shape:'Kreis',emoji:'○',type:'2d',
   fml:`U = 2 · π · r`,ask:'r',ans:`r = ${f('U','2 · π')}`,
   w:[`r = U · 2 · π`,`r = ${f('U','π')}`,`r = ${f('2 · π','U')}`]},
  {shape:'Kreis',emoji:'○',type:'2d',
   fml:`U = π · d`,ask:'d',ans:`d = ${f('U','π')}`,
   w:[`d = U · π`,`d = ${f('π','U')}`,`d = U + π`]},
  {shape:'Kreis',emoji:'○',type:'2d',
   fml:`d = 2 · r`,ask:'r',ans:`r = ${f('d','2')}`,
   w:[`r = 2 · d`,`r = d²`,`r = d − 2`]},

  // TRAPEZ
  {shape:'Trapez',emoji:'⏢',type:'2d',
   fml:`A = ${f('(a + c) · h','2')}`,ask:'h',ans:`h = ${f('2 · A','a + c')}`,
   w:[`h = ${f('A','a + c')}`,`h = ${f('a + c','2 · A')}`,`h = 2 · A · (a + c)`]},
  {shape:'Trapez',emoji:'⏢',type:'2d',
   fml:`A = ${f('(a + c) · h','2')}`,ask:'a',ans:`a = ${f('2 · A','h')} − c`,
   w:[`a = ${f('2 · A','h')} + c`,`a = ${f('A','h')} − c`,`a = 2 · A · h − c`]},

  // PARALLELOGRAMM
  {shape:'Parallelogramm',emoji:'▱',type:'2d',
   fml:`A = g · h`,ask:'g',ans:`g = ${f('A','h')}`,
   w:[`g = A · h`,`g = ${f('h','A')}`,`g = A − h`]},
  {shape:'Parallelogramm',emoji:'▱',type:'2d',
   fml:`A = g · h`,ask:'h',ans:`h = ${f('A','g')}`,
   w:[`h = A · g`,`h = ${f('g','A')}`,`h = A + g`]},

  // QUADER
  {shape:'Quader',emoji:'🧱',type:'3d',
   fml:`V = a · b · c`,ask:'a',ans:`a = ${f('V','b · c')}`,
   w:[`a = V · b · c`,`a = ${f('V','b')} + c`,`a = V − b · c`]},
  {shape:'Quader',emoji:'🧱',type:'3d',
   fml:`V = a · b · c`,ask:'c',ans:`c = ${f('V','a · b')}`,
   w:[`c = V · a · b`,`c = V + a · b`,`c = ${f('a · b','V')}`]},

  // WÜRFEL
  {shape:'Würfel',emoji:'🎲',type:'3d',
   fml:`V = a³`,ask:'a',ans:`a = ∛V`,
   w:[`a = ${f('V','3')}`,`a = V³`,`a = √V`]},
  {shape:'Würfel',emoji:'🎲',type:'3d',
   fml:`O = 6 · a²`,ask:'a',ans:`a = √${f('O','6')}`,
   w:[`a = ${f('O','6')}`,`a = √(O · 6)`,`a = ${f('O²','6')}`]},

  // ZYLINDER
  {shape:'Zylinder',emoji:'🥫',type:'3d',
   fml:`V = π · r² · h`,ask:'h',ans:`h = ${f('V','π · r²')}`,
   w:[`h = V · π · r²`,`h = ${f('π · r²','V')}`,`h = ${f('V','π')} + r²`]},
  {shape:'Zylinder',emoji:'🥫',type:'3d',
   fml:`V = π · r² · h`,ask:'r',ans:`r = √${f('V','π · h')}`,
   w:[`r = ${f('V','π · h')}`,`r = √(V · π · h)`,`r = ${f('V','π · h')}`]},
  {shape:'Zylinder',emoji:'🥫',type:'3d',
   fml:`M = 2 · π · r · h`,ask:'h',ans:`h = ${f('M','2 · π · r')}`,
   w:[`h = M · 2 · π · r`,`h = ${f('M','π · r')}`,`h = ${f('2 · π · r','M')}`]},

  // KEGEL
  {shape:'Kegel',emoji:'🔺',type:'3d',
   fml:`V = ${f('π · r² · h','3')}`,ask:'h',ans:`h = ${f('3 · V','π · r²')}`,
   w:[`h = ${f('V','π · r²')}`,`h = 3 · V · π · r²`,`h = ${f('V · 3','π')}`]},
  {shape:'Kegel',emoji:'🔺',type:'3d',
   fml:`V = ${f('π · r² · h','3')}`,ask:'r',ans:`r = √${f('3 · V','π · h')}`,
   w:[`r = ${f('3 · V','π · h')}`,`r = √${f('V','π · h')}`,`r = √(3 · V · π · h)`]},

  // KUGEL
  {shape:'Kugel',emoji:'🔵',type:'3d',
   fml:`V = ${f('4','3')} · π · r³`,ask:'r',ans:`r = ∛${f('3 · V','4 · π')}`,
   w:[`r = ${f('3 · V','4 · π')}`,`r = √${f('3 · V','4 · π')}`,`r = ∛${f('4 · V','3 · π')}`]},
  {shape:'Kugel',emoji:'🔵',type:'3d',
   fml:`O = 4 · π · r²`,ask:'r',ans:`r = √${f('O','4 · π')}`,
   w:[`r = ${f('O','4 · π')}`,`r = √(O · 4 · π)`,`r = √${f('O','π')} ÷ 4`]},

  // PYRAMIDE
  {shape:'Pyramide',emoji:'🔷',type:'3d',
   fml:`V = ${f('A · h','3')}`,ask:'h',ans:`h = ${f('3 · V','A')}`,
   w:[`h = ${f('V','A')}`,`h = 3 · V · A`,`h = ${f('A','3 · V')}`]},
  {shape:'Pyramide',emoji:'🔷',type:'3d',
   fml:`V = ${f('A · h','3')}`,ask:'A',ans:`A = ${f('3 · V','h')}`,
   w:[`A = ${f('V','3 · h')}`,`A = 3 · V · h`,`A = ${f('V · h','3')}`]},
];

// ── STATE ──
let topic='all', totalQ=20, queue=[], qIdx=0, score=0;

// ── SETUP ──
document.getElementById('topicBtns').onclick=e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  document.querySelectorAll('#topicBtns .sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); topic=btn.dataset.t;
};
document.getElementById('countBtns').onclick=e=>{
  const btn=e.target.closest('[data-c]'); if(!btn) return;
  document.querySelectorAll('#countBtns .sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); totalQ=parseInt(btn.dataset.c);
};

function startFormelGame(){
  let pool=topic==='all'?FORMELN:FORMELN.filter(x=>x.type===topic);
  pool=[...pool].sort(()=>Math.random()-.5);
  queue=Array.from({length:totalQ},(_,i)=>pool[i%pool.length]);
  qIdx=0; score=0;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  showQuestion();
}

function showQuestion(){
  if(qIdx>=totalQ){showResult();return;}
  const q=queue[qIdx];
  document.getElementById('shapeTag').textContent=q.emoji+' '+q.shape;
  // replace π with italic in formula HTML
  const fmlHtml = q.fml
    .replace(/π/g,'<i>π</i>')
    .replace(/²/g,'<sup>2</sup>')
    .replace(/³/g,'<sup>3</sup>');
  document.getElementById('formulaGiven').innerHTML=fmlHtml;
  document.getElementById('formulaAsk').textContent='Stelle um nach:  '+q.ask+' = ?';
  document.getElementById('feedback').textContent='';
  document.getElementById('qCounter').textContent=(qIdx+1)+' / '+totalQ;
  document.getElementById('progressBar').style.width=((qIdx/totalQ)*100)+'%';

  const choices=[q.ans,...q.w].sort(()=>Math.random()-.5);
  const div=document.getElementById('choices'); div.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=fmt(c);
    btn.dataset.idx=i;
    btn.dataset.val=c;
    btn.addEventListener('click',()=>pick(btn, c===q.ans));
    div.appendChild(btn);
  });
}

function pick(btn, isCorrect){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(isCorrect){
    btn.classList.add('correct'); score++;
    document.getElementById('scoreVal').textContent=score;
    fb.textContent='✓ Richtig!'; fb.className='feedback ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent='✗ Falsch!'; fb.className='feedback nok';
    // reveal correct answer
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.dataset.val===queue[qIdx].ans) b.classList.add('reveal');
    });
  }
  setTimeout(()=>{qIdx++;showQuestion();},1300);
}

function showResult(){
  document.getElementById('game').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalSub').textContent='von '+totalQ+' richtig';
  spawnConfetti();
}
function restartFormel(){
  document.getElementById('result').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
}
function goBack(){ window.location.href="index.html"; }
function spawnConfetti(){
  const c=['#FF6B6B','#4ECDC4','#FFD93D','#a29bfe','#fd79a8','#00b894'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}
</script>
</body>
</html>
