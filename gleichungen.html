<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gleichungen lösen</title>
<style>
  
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#FFD93D;--purple:#a29bfe;--green:#2ecc71;--red:#ff4444;--mid:#2c2c3e;--teal:#4ECDC4}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--mid);font-family:Arial,sans-serif;touch-action:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
  .screen.hidden{display:none}

  /* SETUP */
  #setup{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
  #setup h1{font-family:'Trebuchet MS',Arial,sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--gold);text-shadow:0 4px 20px rgba(255,217,61,.4)}
  .setup-row{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:600px}
  .setup-row span{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4)}
  .btn-group{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
  .sel-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 18px;font-family:'Trebuchet MS',Arial,sans-serif;font-size:.95rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .sel-btn.active{background:var(--gold);border-color:var(--gold);color:#1a1a2e;box-shadow:0 4px 14px rgba(255,217,61,.35)}
  .level-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:600px}
  .level-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:12px 14px;font-family:'Trebuchet MS',Arial,sans-serif;font-size:.88rem;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.4}
  .level-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 4px 14px rgba(162,155,254,.35)}
  .start-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:13px 44px;font-family:'Trebuchet MS',Arial,sans-serif;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 28px rgba(255,217,61,.4);transition:transform .15s}
  .start-btn:active{transform:scale(.96)}

  /* GAME */
  #game{background:linear-gradient(135deg,#1a1a2e,#0f3460);justify-content:space-between;padding:20px}
  .game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:700px}
  .score-display{font-family:'Trebuchet MS',Arial,sans-serif;font-size:1.1rem;color:rgba(255,255,255,.5)}
  .score-display span{color:var(--gold);font-size:1.4rem}
  .progress-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:0 16px}
  .progress-bar{height:100%;background:var(--purple);border-radius:4px;transition:width .4s}

  .question-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:24px;padding:20px 24px;width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .q-tag{font-family:'Trebuchet MS',Arial,sans-serif;font-size:.85rem;color:var(--purple);text-transform:uppercase;letter-spacing:2px}
  .q-text{font-family:'Trebuchet MS',Arial,sans-serif;font-size:clamp(1rem,2vw,1.3rem);color:rgba(255,255,255,.5);text-align:center}
  .q-equation{font-family:'Trebuchet MS',Arial,sans-serif;font-size:clamp(1.6rem,3.5vw,2.4rem);color:#fff;text-align:center;background:rgba(255,255,255,.08);border-radius:14px;padding:14px 24px;width:100%;letter-spacing:1px}

  /* numpad input */
  .input-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:340px}
  .input-label{font-family:'Trebuchet MS',Arial,sans-serif;font-size:1rem;color:rgba(255,255,255,.4)}
  .input-display{font-family:'Trebuchet MS',Arial,sans-serif;font-size:2.2rem;min-width:120px;min-height:64px;border-radius:14px;border:3px solid rgba(162,155,254,.4);background:rgba(255,255,255,.06);color:#fff;display:flex;align-items:center;justify-content:center;letter-spacing:3px;padding:0 16px}
  .input-display.has-val{background:rgba(255,255,255,.1)}

  .numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:340px}
  .num-btn{aspect-ratio:1;border:none;border-radius:12px;font-family:'Trebuchet MS',Arial,sans-serif;font-size:1.4rem;background:rgba(162,155,254,.15);color:var(--purple);border:2px solid rgba(162,155,254,.25);cursor:pointer;transition:transform .1s,filter .1s;-webkit-tap-highlight-color:transparent}
  .num-btn:active{transform:scale(.9);filter:brightness(.8)}
  .num-btn.minus-btn{background:rgba(162,155,254,.08);color:rgba(162,155,254,.7)}
  .num-btn.del-btn{background:rgba(162,155,254,.08);color:rgba(162,155,254,.7);font-size:1.1rem}
  .num-btn.ok-btn{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 14px rgba(162,155,254,.4)}

  .feedback{font-family:'Trebuchet MS',Arial,sans-serif;font-size:1.1rem;min-height:26px;text-align:center}
  .feedback.ok{color:var(--green)}.feedback.nok{color:var(--red)}
  .hint{font-family:'Trebuchet MS',Arial,sans-serif;font-size:.85rem;color:rgba(255,255,255,.3);text-align:center;min-height:20px}

  /* RESULT */
  #result{background:linear-gradient(135deg,#1a1a2e,#0f3460)}
  #result h2{font-family:'Trebuchet MS',Arial,sans-serif;font-size:clamp(2rem,5vw,3rem);color:var(--gold)}
  .result-score{font-family:'Trebuchet MS',Arial,sans-serif;font-size:5rem;color:#fff;line-height:1}
  .result-sub{font-size:1rem;color:rgba(255,255,255,.4);font-family:'Trebuchet MS',Arial,sans-serif}
  .result-btn{background:var(--gold);color:#1a1a2e;border:none;border-radius:50px;padding:13px 44px;font-family:'Trebuchet MS',Arial,sans-serif;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 24px rgba(255,217,61,.4)}
  .confetti-piece{position:fixed;border-radius:2px;animation:confettiFall linear forwards;z-index:999;pointer-events:none}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen">
  <h1>🔢 Gleichungen lösen</h1>
  <div class="setup-row">
    <span>📊 Schwierigkeitsgrad</span>
    <div class="level-grid" id="levelBtns">
      <button class="level-btn active" data-l="A">⭐ Einfach<br><small style="font-size:.72rem;opacity:.6">x + 5 = 9</small></button>
      <button class="level-btn" data-l="B">⭐⭐ Mittel<br><small style="font-size:.72rem;opacity:.6">3x = 12</small></button>
      <button class="level-btn" data-l="C">⭐⭐⭐ Schwer<br><small style="font-size:.72rem;opacity:.6">2x + 3 = 11</small></button>
      <button class="level-btn" data-l="M">🔀 Gemischt<br><small style="font-size:.72rem;opacity:.6">alle drei zusammen</small></button>
    </div>
  </div>
  <div class="setup-row">
    <span>🎯 Anzahl Aufgaben</span>
    <div class="btn-group" id="countBtns">
      <button class="sel-btn" data-c="10">10</button>
      <button class="sel-btn active" data-c="20">20</button>
      <button class="sel-btn" data-c="30">30</button>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">Los geht's! 🚀</button>
  <button style="background:none;border:none;color:rgba(255,255,255,.3);font-family:'Trebuchet MS',Arial,sans-serif;font-size:.9rem;cursor:pointer" onclick="goBack()">← Zurück</button>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
  <div class="game-header">
    <div class="score-display">✓ <span id="scoreVal">0</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="score-display" id="qCounter">1 / 20</div>
  </div>

  <div class="question-card">
    <div class="q-tag" id="qTag">Mittel</div>
    <div class="q-text">Bestimme x:</div>
    <div class="q-equation" id="qEq">3x + 5 = 2x + 12</div>
  </div>

  <div class="input-wrap">
    <div class="input-label">x =</div>
    <div class="input-display" id="inputDisplay">_</div>
  </div>

  <div class="numpad" id="numpad"></div>
  <div class="feedback" id="feedback"></div>
  <div class="hint" id="hint"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen hidden">
  <div style="font-size:3rem">🏆</div>
  <h2>Ergebnis</h2>
  <div class="result-score" id="finalScore">0</div>
  <div class="result-sub" id="finalSub">von 20 richtig</div>
  <button class="result-btn" onclick="restartGame()">Nochmal 🔄</button>
  <button style="background:none;border:none;color:rgba(255,255,255,.3);font-family:'Trebuchet MS',Arial,sans-serif;font-size:.9rem;cursor:pointer;margin-top:8px" onclick="goBack()">← Zurück</button>
</div>

<script>
// ── EQUATION GENERATORS ──
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function rndNZ(min,max){ let v; do{v=rnd(min,max);}while(v===0); return v; }

// Typ A: x + b = c  or  x - b = c
function makeTypeA(){
  const x = rnd(1, 20);
  const b = rnd(1, 15);
  const op = Math.random()<.5 ? '+' : '-';
  const c = op==='+' ? x+b : x-b;
  return { eq:`x ${op} ${b} = ${c}`, x, tag:'⭐ Einfach' };
}

// Typ B: ax = c
function makeTypeB(){
  const a = rndNZ(2, 10);
  const x = rnd(1, 12);
  const c = a*x;
  return { eq:`${a}x = ${c}`, x, tag:'⭐⭐ Mittel' };
}

// Typ C: ax + b = c
function makeTypeC(){
  const a = rndNZ(2, 6);
  const x = rnd(1, 10);
  const b = rnd(1, 20);
  const op = Math.random()<.5 ? '+' : '-';
  const c = op==='+' ? a*x+b : a*x-b;
  if(c<=0) return makeTypeC();
  return { eq:`${a}x ${op} ${b} = ${c}`, x, tag:'⭐⭐⭐ Schwer' };
}

// ── STATE ──
let selectedLevel = 'A';
let totalQ = 20, queue = [], qIdx = 0, score = 0;
let inputVal = '', inputNeg = false;

// ── SETUP ──
document.getElementById('levelBtns').onclick=e=>{
  const btn=e.target.closest('[data-l]'); if(!btn) return;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedLevel=btn.dataset.l;
};
document.getElementById('countBtns').onclick=e=>{
  const btn=e.target.closest('[data-c]'); if(!btn) return;
  document.querySelectorAll('#countBtns .sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); totalQ=parseInt(btn.dataset.c);
};

function buildNumpad(){
  const pad = document.getElementById('numpad');
  pad.innerHTML = '';
  // 1–9
  for(let i=1;i<=9;i++) addNBtn(pad, String(i), ()=>pressNum(String(i)));
  // row 4: ±  0  ⌫  ✓
  addNBtn(pad,'±',()=>pressSign(),'minus-btn');
  addNBtn(pad,'0',()=>pressNum('0'));
  addNBtn(pad,'⌫',()=>pressNum('del'),'del-btn');
  addNBtn(pad,'✓',()=>submitAnswer(),'ok-btn');
}

function addNBtn(pad,label,action,cls=''){
  const btn=document.createElement('button');
  btn.className='num-btn '+(cls||'');
  btn.textContent=label;
  btn.addEventListener('touchstart',e=>{e.preventDefault();action();},{passive:false});
  btn.addEventListener('click',action);
  pad.appendChild(btn);
}

function pressNum(val){
  if(val==='del'){
    if(!inputVal && inputNeg){ inputNeg=false; }
    else inputVal=inputVal.slice(0,-1);
  } else {
    if(inputVal.length>=3) return;
    inputVal+=val;
  }
  updateInputDisplay();
}
function pressSign(){ inputNeg=!inputNeg; updateInputDisplay(); }
function updateInputDisplay(){
  const d=document.getElementById('inputDisplay');
  const sign=inputNeg?'−':'';
  d.textContent=inputVal?sign+inputVal:(sign||'_');
  d.classList.toggle('has-val',!!inputVal||inputNeg);
}

function submitAnswer(){
  const raw=parseInt(inputVal);
  if(isNaN(raw)) return;
  const val=inputNeg?-Math.abs(raw):raw;
  inputVal=''; inputNeg=false; updateInputDisplay();

  const q=queue[qIdx];
  const fb=document.getElementById('feedback');
  const hint=document.getElementById('hint');

  if(val===q.x){
    score++;
    document.getElementById('scoreVal').textContent=score;
    fb.textContent='✓ Richtig! x = '+q.x; fb.className='feedback ok';
    hint.textContent='';
  } else {
    fb.textContent='✗ Falsch!'; fb.className='feedback nok';
    hint.textContent='Richtig wäre: x = '+q.x;
  }
  setTimeout(()=>{qIdx++;showQuestion();},1400);
}

function startGame(){
  const gens={A:[makeTypeA], B:[makeTypeB], C:[makeTypeC], M:[makeTypeA,makeTypeB,makeTypeC]};
  const pool=gens[selectedLevel];
  queue=Array.from({length:totalQ},()=>pool[~~(Math.random()*pool.length)]());
  qIdx=0; score=0; inputVal=''; inputNeg=false;
  buildNumpad();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  showQuestion();
}

function showQuestion(){
  if(qIdx>=totalQ){showResult();return;}
  const q=queue[qIdx];
  document.getElementById('qTag').textContent=q.tag;
  document.getElementById('qEq').textContent=q.eq;
  document.getElementById('feedback').textContent='';
  document.getElementById('hint').textContent='';
  document.getElementById('inputDisplay').textContent='_';
  document.getElementById('inputDisplay').classList.remove('has-val');
  document.getElementById('qCounter').textContent=(qIdx+1)+' / '+totalQ;
  document.getElementById('progressBar').style.width=((qIdx/totalQ)*100)+'%';
}

function showResult(){
  document.getElementById('game').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalSub').textContent='von '+totalQ+' richtig';
  spawnConfetti();
}
function restartGame(){
  document.getElementById('result').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
}
function goBack(){ window.location.href="index.html"; }
function spawnConfetti(){
  const c=['#FF6B6B','#4ECDC4','#FFD93D','#a29bfe','#fd79a8','#00b894'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}
</script>
</body>
</html>
